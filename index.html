<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialTrack</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;margin:0;min-height:100vh;display:flex}
.sidebar{width:240px;background:#1b1b1b;padding:16px;box-sizing:border-box;border-right:1px solid #333}
.main{flex:1;padding:20px;box-sizing:border-box}
button{cursor:pointer}
.navbtn,.topbtn{display:block;width:100%;padding:10px 12px;margin:6px 0;background:#222;color:#eee;border:1px solid #333;border-radius:8px;text-align:left}
.navbtn.active{background:#2d5d66}
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;background:#2d5d66}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #444;background:#111;color:#eee}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modalbox{width:100%;max-width:520px;background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:18px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.small{color:#aaa;font-size:12px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-bottom:1px solid #333;padding:10px;text-align:left}
.hidden{display:none}
</style>
</head>
<body>
<div class="sidebar">
<h2>DialTrack</h2>
<div class="small">Διαχείριση Καμπανιών & Αριθμών</div>
<button class="navbtn active" data-view="dashboard">Dashboard</button>
<button class="navbtn" data-view="campaigns">Καμπάνιες</button>
<button class="navbtn" data-view="numbers">Αριθμοί</button>
<button class="navbtn" data-view="history">Ιστορικό</button>
</div>
<div class="main">
<div class="topbar">
<button class="topbtn" id="newCampBtn">Νέα Καμπάνια</button>
<button class="topbtn" id="newNumBtn">Νέος Αριθμός</button>
</div>
<div id="dashboard" class="view">
<div class="card"><h3>Σύνοψη</h3><div id="stats"></div></div>
<div class="grid" id="campaignGrid"></div>
</div>
<div id="campaigns" class="view hidden">
<div class="card"><h3>Καμπάνιες</h3><div id="campaignList"></div></div>
</div>
<div id="numbers" class="view hidden">
<div class="card"><h3>Αριθμοί</h3><div id="numbersList"></div></div>
</div>
<div id="history" class="view hidden">
<div class="card"><h3>Ιστορικό</h3><table class="table"><thead><tr><th>Ημ/νία</th><th>Καμπάνια</th><th>Αριθμός</th><th>Σημείωση</th></tr></thead><tbody id="historyBody"></tbody></table></div>
</div>
</div>

<div class="modal" id="campModal"><div class="modalbox"><h3 id="campTitle">Νέα Καμπάνια</h3><div class="row"><div><label>Κωδικός</label><input id="campCode"></div><div><label>Όνομα</label><input id="campName"></div></div><div style="margin-top:10px"><label>Κατάσταση</label><select id="campStatus"><option value="active">Active</option><option value="paused">Paused</option><option value="inactive">Inactive</option></select></div><div style="margin-top:10px"><label>Σημείωση</label><textarea id="campNote" rows="3"></textarea></div><div class="actions"><button id="saveCampBtn">Αποθήκευση</button><button data-close="campModal">Κλείσιμο</button></div></div></div>

<div class="modal" id="numModal"><div class="modalbox"><h3 id="numTitle">Νέος Αριθμός</h3><div class="row"><div><label>Αριθμός</label><input id="numValue"></div><div><label>Ετικέτα</label><input id="numLabel"></div></div><div class="actions"><button id="saveNumBtn">Αποθήκευση</button><button data-close="numModal">Κλείσιμο</button></div></div></div>

<script>
const state={campaigns:[],numbers:[],history:[]};
let editCampId=null;
function uid(){return Math.random().toString(36).slice(2,10)}
function fmtDate(d){return new Date(d).toLocaleString('el-GR')}
function save(){localStorage.setItem('dialtrack',JSON.stringify(state))}
function load(){try{const s=JSON.parse(localStorage.getItem('dialtrack')||'{}');if(s.campaigns)state.campaigns=s.campaigns;if(s.numbers)state.numbers=s.numbers;if(s.history)state.history=s.history}catch(e){}}
function initSeed(){if(!state.campaigns.length){const n1={id:uid(),number:'2100000001',label:'Sales'};const n2={id:uid(),number:'2100000002',label:'Support'};state.numbers.push(n1,n2);state.campaigns.push({id:uid(),code:'C-001',name:'Demo Campaign',status:'active',note:'',activeNumId:n1.id},{id:uid(),code:'C-002',name:'Second Campaign',status:'paused',note:'',activeNumId:n2.id});state.history.push({id:uid(),campId:state.campaigns[0].id,number:n1.number,note:'Αρχική ανάθεση',at:new Date().toISOString()});save()}}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===id))}
function campLabel(c){return `${c.code?c.code+' - ':''}${c.name}`}
function render(){document.getElementById('stats').innerHTML=`<div class="badge">Καμπάνιες: ${state.campaigns.length}</div> <div class="badge">Αριθμοί: ${state.numbers.length}</div> <div class="badge">Εγγραφές: ${state.history.length}</div>`;document.getElementById('campaignGrid').innerHTML=state.campaigns.map(c=>{const num=state.numbers.find(n=>n.id===c.activeNumId);return `<div class="card"><div><strong>${campLabel(c)}</strong></div><div class="small">${c.status}</div><div style="margin-top:8px"><span class="badge">${num?num.number:'Χωρίς αριθμό'}</span></div><div class="actions"><button class="action-edit" data-id="${c.id}">Edit</button><button class="action-assign" data-id="${c.id}">Αλλαγή αριθμού</button></div></div>`}).join('')||'<div class="small">Δεν υπάρχουν καμπάνιες</div>';document.getElementById('campaignList').innerHTML=state.campaigns.map(c=>`<div class="card"><strong>${campLabel(c)}</strong><div class="small">${c.status}</div><div class="small">${c.note||'—'}</div></div>`).join('')||'<div class="small">Δεν υπάρχουν καμπάνιες</div>';document.getElementById('numbersList').innerHTML=state.numbers.map(n=>`<div class="card"><strong>${n.number}</strong><div class="small">${n.label||'—'}</div></div>`).join('')||'<div class="small">Δεν υπάρχουν αριθμοί</div>';document.getElementById('historyBody').innerHTML=state.history.slice().reverse().map(h=>{const c=state.campaigns.find(x=>x.id===h.campId);return `<tr><td>${fmtDate(h.at)}</td><td>${c?campLabel(c):'—'}</td><td>${h.number}</td><td>${h.note||'—'}</td></tr>`}).join('')||'<tr><td colspan="4">Δεν υπάρχει ιστορικό</td></tr>'}
function openCampaignModal(){editCampId=null;document.getElementById('campTitle').textContent='Νέα Καμπάνια';document.getElementById('campCode').value='';document.getElementById('campName').value='';document.getElementById('campStatus').value='active';document.getElementById('campNote').value='';document.getElementById('campModal').classList.add('open')}
function editCampaign(id){const c=state.campaigns.find(x=>x.id===id);if(!c)return;editCampId=id;document.getElementById('campTitle').textContent='Επεξεργασία Καμπάνιας';document.getElementById('campCode').value=c.code||'';document.getElementById('campName').value=c.name||'';document.getElementById('campStatus').value=c.status||'active';document.getElementById('campNote').value=c.note||'';document.getElementById('campModal').classList.add('open')}
function saveCampaign(){const name=document.getElementById('campName').value.trim();if(!name){alert('Βάλε όνομα καμπάνιας');return}if(editCampId){const c=state.campaigns.find(x=>x.id===editCampId);c.code=document.getElementById('campCode').value.trim();c.name=name;c.status=document.getElementById('campStatus').value;c.note=document.getElementById('campNote').value.trim()}else{state.campaigns.push({id:uid(),code:document.getElementById('campCode').value.trim(),name:name,status:document.getElementById('campStatus').value,note:document.getElementById('campNote').value.trim(),activeNumId:null})}save();closeModal('campModal');render()}
function openNumberModal(){document.getElementById('numValue').value='';document.getElementById('numLabel').value='';document.getElementById('numModal').classList.add('open')}
function saveNumber(){const number=document.getElementById('numValue').value.trim();if(!number){alert('Βάλε αριθμό');return}state.numbers.push({id:uid(),number:number,label:document.getElementById('numLabel').value.trim()});save();closeModal('numModal');render()}
function assignNumber(campId){const c=state.campaigns.find(x=>x.id===campId);const number=prompt('Δώσε νέο αριθμό:');if(!number)return;let n=state.numbers.find(x=>x.number===number.trim());if(!n){n={id:uid(),number:number.trim(),label:''};state.numbers.push(n)}c.activeNumId=n.id;state.history.push({id:uid(),campId:campId,number:n.number,note:'Αλλαγή αριθμού',at:new Date().toISOString()});save();render()}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.navbtn').forEach(b=>b.addEventListener('click',()=>showView(b.dataset.view)));
document.getElementById('newCampBtn').addEventListener('click',openCampaignModal);
document.getElementById('newNumBtn').addEventListener('click',openNumberModal);
document.getElementById('saveCampBtn').addEventListener('click',saveCampaign);
document.getElementById('saveNumBtn').addEventListener('click',saveNumber);
document.addEventListener('click',e=>{if(e.target.matches('[data-close]'))closeModal(e.target.dataset.close);if(e.target.classList.contains('action-edit'))editCampaign(e.target.dataset.id);if(e.target.classList.contains('action-assign'))assignNumber(e.target.dataset.id);if(e.target.classList.contains('modal')&&e.target.id)closeModal(e.target.id)});
load();initSeed();render();
</script>
</body>
</html>

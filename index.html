<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialTrack</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;margin:0;min-height:100vh;display:flex}
.sidebar{width:240px;background:#1b1b1b;padding:16px;box-sizing:border-box;border-right:1px solid #333}
.main{flex:1;padding:20px;box-sizing:border-box}
button{cursor:pointer}
.navbtn,.topbtn{display:block;width:100%;padding:10px 12px;margin:6px 0;background:#222;color:#eee;border:1px solid #333;border-radius:8px;text-align:left}

.navbtn.active{background:#2d5d66}
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;background:#2d5d66;margin-right:8px}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #444;background:#111;color:#eee}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:16px;z-index:100}
.modal.open{display:flex}

.modalbox{width:100%;max-width:520px;background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:18px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.small{color:#aaa;font-size:12px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-bottom:1px solid #333;padding:10px;text-align:left}
.hidden{display:none}
</style>
</head>
<body>
<div class="sidebar">
<h2>DialTrack</h2>
<div class="small">Διαχείριση Καμπανιών & Αριθμών</div>
<button class="navbtn active" data-view="dashboard">Dashboard</button>
<button class="navbtn" data-view="campaigns">Καμπάνιες</button>
<button class="navbtn" data-view="numbers">Αριθμοί</button>
<button class="navbtn" data-view="history">Ιστορικό</button>
</div>

<div class="main">
<div class="topbar">
<button class="topbtn" id="newCampBtn">Νέα Καμπάνια</button>
<button class="topbtn" id="newNumBtn">Νέος Αριθμός</button>
</div>

<div id="dashboard" class="view">
<div class="card"><h3>Σύνοψη</h3><div id="stats"></div></div>
<div class="grid" id="campaignGrid"></div>
</div>

<div id="campaigns" class="view hidden">
<div class="card"><h3>Καμπάνιες</h3><div id="campaignList"></div></div>
</div>

<div id="numbers" class="view hidden">
<div class="card"><h3>Αριθμοί</h3><div id="numbersList"></div></div>
</div>

<div id="history" class="view hidden">
<div class="card"><h3>Ιστορικό</h3>
<table class="table">
<thead><tr><th>Ημ/νία</th><th>Καμπάνια</th><th>Αριθμός</th><th>Σημείωση</th></tr></thead>
<tbody id="historyBody"></tbody>
</table>
</div>
</div>
</div>

<!-- Camp Modal -->
<div class="modal" id="campModal">
<div class="modalbox">
<h3 id="campTitle">Νέα Καμπάνια</h3>
<div class="row">
<div><label>Κωδικός</label><input id="campCode"></div>
<div><label>Όνομα</label><input id="campName"></div>
</div>
<div style="margin-top:10px">
<label>Συνδεδεμένος Αριθμός</label>
<select id="campNumberSelect"><option value="">Επιλέξτε Αριθμό</option></select>
</div>
<div style="margin-top:10px">
<label>Κατάσταση</label>
<select id="campStatus">
<option value="active">Active</option>
<option value="paused">Paused</option>
<option value="inactive">Inactive</option>
</select>
</div>
<div style="margin-top:10px">
<label>Σημείωση</label>
<textarea id="campNote" rows="3"></textarea>
</div>
<div class="actions">
<button id="saveCampBtn">Αποθήκευση</button>
<button id="closeCampBtn">Κλείσιμο</button>
</div>
</div>
</div>

<!-- Num Modal -->
<div class="modal" id="numModal">
<div class="modalbox">
<h3 id="numTitle">Νέος Αριθμός</h3>
<div class="row">
<div><label>Αριθμός</label><input id="numValue"></div>
<div><label>Ετικέτα</label><input id="numLabel"></div>
</div>
<div class="actions">
<button id="saveNumBtn">Αποθήκευση</button>
<button id="closeNumBtn">Κλείσιμο</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics.js';
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

const firebaseConfig = {
apiKey: "AIzaSyAoWcObIHsd-23QFiqySEp3eovh_2Y2aCc",
authDomain: "dialtrack-1586e.firebaseapp.com",
projectId: "dialtrack-1586e",
storageBucket: "dialtrack-1586e.firebasestorage.app",
messagingSenderId: "958146792626",
appId: "1:958146792626:web:685fd38325272fc79e0dab",
measurementId: "G-PDVS25FYJ7"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getFirestore(app);

let campaigns = [];
let numbers = [];
let history = [];
let editCampId = null;
let editNumId = null;

function fmtDate(at) { 
    if(!at) return '—';
    // Handle Firestore serverTimestamp vs plain string
    const d = at.seconds ? new Date(at.seconds * 1000) : new Date(at);
    return isNaN(d.getTime()) ? '—' : d.toLocaleString('el-GR');
}
function campLabel(c){ return `${c.code ? c.code + ' - ' : ''}${c.name || ''}`; }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function showView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.view===id));
}

function currentNum(c){ return numbers.find(n=>n.id===c.activeNumId); }
function numCampLabel(n){ const c=campaigns.find(x=>x.activeNumId===n.id); return c ? campLabel(c) : ''; }

function render(){
// 1. Stats
document.getElementById('stats').innerHTML = `
<div class="badge">Καμπάνιες: ${campaigns.length}</div>
<div class="badge">Αριθμοί: ${numbers.length}</div> 
<div class="badge">Εγγραφές: ${history.length}</div>
`;

// 2. Camp Select Populate in Modal
const selectHtml = ['<option value="">Επιλέξτε Αριθμό</option>'].concat(
    numbers.map(n => `<option value="${n.id}">${n.number} (${n.label || '—'})</option>`)
).join('');
document.getElementById('campNumberSelect').innerHTML = selectHtml;

// 3. Dashboard Grid
document.getElementById('campaignGrid').innerHTML = campaigns.map(c=>{
const num=currentNum(c);
return `
<div class="card"> 
    <div><strong>${campLabel(c)}</strong></div>
    <div class="small">Αριθμός: <span>${num ? num.number : 'Χωρίς αριθμό'}</span></div>
    <div class="actions">
        <button class="action-edit-camp" data-id="${c.id}">Επεξεργασία</button>
        <button class="action-delete" data-type="campaign" data-id="${c.id}">Διαγραφή</button> 
    </div> 
</div>`;
}).join('') || '<div class="small">Δεν υπάρχουν καμπάνιες</div>';

// 4. Campaign List View
document.getElementById('campaignList').innerHTML = campaigns.map(c=>`
<div class="card"> 
    <strong>${campLabel(c)}</strong>
    <div class="small">Σημείωση: ${c.note || '—'}</div>
    <div class="small">Κατάσταση: ${c.status || 'active'}</div>
    <div class="actions">
        <button class="action-edit-camp" data-id="${c.id}">Επεξεργασία</button>
        <button class="action-delete" data-type="campaign" data-id="${c.id}">Διαγραφή</button>
    </div>
</div>
`).join('') || '<div class="small">Δεν υπάρχουν καμπάνιες</div>';

// 5. Numbers List View
document.getElementById('numbersList').innerHTML = numbers.map(n=>`
<div class="card"> 
    <strong>${n.number}</strong>
    <div class="small">${n.label || '—'}</div> 
    <div class="small">${numCampLabel(n) ? 'Χρήση: ' + numCampLabel(n) : 'Ελεύθερος'}</div>
    <div class="actions">
        <button class="action-edit-num" data-id="${n.id}">Επεξεργασία</button> 
        <button class="action-delete" data-type="number" data-id="${n.id}">Διαγραφή</button>
    </div>
</div>
`).join('') || '<div class="small">Δεν υπάρχουν αριθμοί</div>';

// 6. History Table
document.getElementById('historyBody').innerHTML = history.map(h=>{
const c=campaigns.find(x=>x.id===h.campId);
return `
<tr>
    <td>${fmtDate(h.at)}</td>
    <td>${c ? campLabel(c) : 'Άγνωστη Καμπάνια'}</td>
    <td>${h.number || '—'}</td>
    <td>${h.note || '—'}</td>
</tr>`;
}).join('') || '<tr><td colspan="4">Δεν υπάρχει ιστορικό</td></tr>';

attachDynamicListeners();
}

function startListeners(){
    onSnapshot(collection(db,'campaigns'), snap=>{
        campaigns = snap.docs.map(d=>({id:d.id, ...d.data()}));
        render();
    });

    onSnapshot(collection(db,'numbers'), snap=>{
        numbers = snap.docs.map(d=>({id:d.id, ...d.data()}));
        render();
    });

    onSnapshot(collection(db,'history'), snap=>{
        history = snap.docs.map(d=>({id:d.id, ...d.data()}));
        render();
    });
}

// Actions
async function saveCampaign(){
    const name = document.getElementById('campName').value.trim();
    const code = document.getElementById('campCode').value.trim();
    const status = document.getElementById('campStatus').value;
    const note = document.getElementById('campNote').value.trim();
    const activeNumId = document.getElementById('campNumberSelect').value;

    if(!name){ alert('Παρακαλώ εισάγετε όνομα καμπάνιας!'); return; }

    const data = { code, name, status, note, activeNumId };

    try {
        if(editCampId){
            const oldCamp = campaigns.find(c => c.id === editCampId);
            await updateDoc(doc(db, 'campaigns', editCampId), data);
            
            // Log history if number changed
            if(oldCamp && oldCamp.activeNumId !== activeNumId) {
                const numObj = numbers.find(n => n.id === activeNumId);
                await addDoc(collection(db, 'history'), {
